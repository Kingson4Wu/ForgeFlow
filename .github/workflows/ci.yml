name: CI
on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - '**'

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Install deps
        run: |
          uv sync --all-extras
      - name: Run health checks
        run: |
          chmod +x scripts/check-health.sh
          . .venv/bin/activate
          ./scripts/check-health.sh
